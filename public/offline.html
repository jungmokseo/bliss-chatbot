<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLISS Lab FAQ — 오프라인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #4A6CF7 0%, #7C3AED 100%);
    color: white; text-align: center;
  }
  .container { padding: 40px; max-width: 380px; }
  .icon { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  p { font-size: 15px; opacity: 0.85; line-height: 1.6; margin-bottom: 32px; }
  .retry-btn {
    display: inline-block; padding: 14px 36px;
    background: rgba(255,255,255,0.2); color: white;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    transition: all 0.2s;
  }
  .retry-btn:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인한 후<br>다시 시도해 주세요.</p>
    <a href="./" class="retry-btn">다시 시도</a>
  </div>
</body>
</html>
